            posArr[idx] = (Math.random() - 0.5) * area;
            posArr[idx + 2] = (Math.random() - 0.5) * area;

                  className: "px-8 py-2 bg-yellow-500/20 text-yellow-300 hover:bg-yellow-500/30 transition-colors rounded-lg font-bold text-sm"
                }, "🛒 Visit Shop"),
                React.createElement('button', {
                  onClick: quitToMenu,
                  className: "text-sm text-slate-400 hover:text-white underline underline-offset-4 mt-1"
                }, "Back to Menu")
              )
            )
          ),

          // ====== LEVEL COMPLETE SCREEN ======
          gameState === GameState.LEVEL_COMPLETE && React.createElement('div', { className: "flex items-center justify-center h-full pointer-events-auto" },
            React.createElement('div', { className: "float-in text-center bg-black/70 p-8 md:p-10 rounded-3xl backdrop-blur-md border border-emerald-400/40 max-w-sm" },
              React.createElement('div', { className: "text-6xl mb-4" }, "🏆"),
              React.createElement('h2', { className: "text-2xl md:text-3xl pixel-font text-emerald-400 mb-2" }, "REALM CLEARED!"),
              React.createElement('p', { className: "text-white mb-1 font-bold" }, `${level.icon} ${level.name}`),
              currentLevel === LEVELS.length - 1
                ? React.createElement('p', { className: "text-yellow-300 text-sm mb-6 font-bold" }, "★ You've conquered ALL realms! ★")
                : React.createElement('p', { className: "text-slate-300 mb-6 text-sm" }, `${LEVELS[currentLevel + 1].icon} ${LEVELS[currentLevel + 1].name} unlocked!`),
              React.createElement('div', { className: "flex justify-center gap-6 mb-6" },
                React.createElement('div', null,
                  React.createElement('p', { className: "text-[10px] text-slate-400 uppercase" }, "Score"),
                  React.createElement('p', { className: "text-2xl font-mono font-bold text-emerald-400" }, score)
                ),
                React.createElement('div', null,
                  React.createElement('p', { className: "text-[10px] text-slate-400 uppercase" }, "Coins Earned"),
                  React.createElement('p', { className: "text-2xl font-mono font-bold text-yellow-400" }, `${score * 10 + 50} 🪙`)
                )
              ),
              React.createElement('div', { className: "flex flex-col gap-3" },
                currentLevel < LEVELS.length - 1 && React.createElement('button', {
                  onClick: goNextLevel,
                  className: "px-8 py-3 bg-emerald-500 hover:bg-emerald-400 transition-colors rounded-lg font-bold text-lg text-white shadow-lg"
                }, "▶ NEXT REALM"),
                React.createElement('button', {
                  onClick: () => setGameState(GameState.SHOP),
                  className: "px-8 py-2 bg-yellow-500/20 text-yellow-300 hover:bg-yellow-500/30 transition-colors rounded-lg font-bold text-sm"
                }, "🛒 Visit Shop"),
                React.createElement('button', {
                  onClick: quitToMenu,
                  className: "text-sm text-slate-400 hover:text-white underline underline-offset-4 mt-1"
                }, "Back to Menu")
              )
            )
          ),

          React.createElement('div', null)
        )
      );
    };

    const root = ReactDOMClient.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
